              - generic [ref=e194]:
                - emphasis [ref=e195]: DS
                - text: 隶属于PSA集团，是法国汽车工业顶级设计豪华品牌。
                - emphasis [ref=e196]: DS
                - text: 的法文全称为Déesse，在法语中是“女神”的意思。1955年，
                - emphasis [ref=e197]: DS
                - text: 于巴黎车展首次亮相就以设计和技术上的创新引起了轰动，并引发了汽车业的革命，在汽车发展史上有着非常重要的地位。
                - emphasis [ref=e198]: DS
                - text: 极受法国政要的欢迎，被誉为“总统座驾”，从戴高乐到奥朗德，
                - emphasis [ref=e199]: DS
                - text: 都是法国总统的不二之选。2011年，长安标致雪铁龙汽车有限公司成立。2012年，
                - emphasis [ref=e200]: DS
                - text: 品牌携旗下产品正式登陆中国，作为标致雪铁龙汽车集团旗下的新世代豪华汽车品牌，致力于为消费者提供创新、个性化以及激发灵感的驾乘感受。2022年2月7日消息，
                - emphasis [ref=e201]: DS
                - text: 汽车向法国驻上海总领事馆交付一号公务车。
