          - heading "Claude Fable 5 and Claude Mythos 5" [level=1] [ref=e39]
          - generic [ref=e40]: 2026年6月9日
        - img "The number five composed of several butterflies" [ref=e42]
      - article [ref=e44]:
        - generic [ref=e46]:
          - paragraph [ref=e47]:
            - text: Today we’re launching
            - strong [ref=e48]: Claude Fable 5
            - text: ": a Mythos-class"
            - superscript [ref=e49]: "1"
            - text: model that we’ve made safe for general use.
          - paragraph [ref=e50]: Fable 5’s capabilities exceed those of any model we’ve ever made generally available. It is state-of-the-art on nearly all tested benchmarks of AI capability, showing exceptional performance in software engineering, knowledge work, vision, scientific research, and many other areas. The longer and more complex the task, the larger Fable 5’s lead over our other models.
          - paragraph [ref=e51]: Releasing a model this capable comes with risks. Without safeguards, Fable 5’s capabilities in areas like cybersecurity could be misused to cause serious damage. We’ve therefore launched the model with safeguards that mean queries on some topics will instead receive a response from our next-most-capable model, Claude Opus 4.8. To release the model both safely and quickly, we’ve tuned these safeguards conservatively—they’ll sometimes catch harmless requests, though they trigger, on average, in less than 5% of sessions. With more capable models arriving in the coming months, we’re working to improve our safeguards and reduce false positives as quickly as we can.
          - paragraph [ref=e52]:
            - text: For a small group of cyberdefenders and infrastructure providers, we’re also launching
            - strong [ref=e53]: Claude Mythos 5
            - text: . It’s the same underlying model as Fable 5, but with the safeguards lifted in some areas.
            - superscript [ref=e54]: "2"
            - text: Mythos 5 will initially be deployed through
            - link "Project Glasswing" [ref=e55] [cursor=pointer]:
              - /url: https://www.anthropic.com/glasswing
            - text: ", in collaboration with the US government, as an upgrade to Claude Mythos Preview. It has the strongest cybersecurity capabilities of any model in the world. Soon, we intend to expand access to Mythos 5 through a broader trusted access program."
          - paragraph [ref=e56]:
            - text: The capabilities of models like Fable 5 and Mythos 5 have the potential to do profound good for the world. We’ve seen the beginnings of this in Project Glasswing, where the models have
            - link "helped cyber defenders" [ref=e57] [cursor=pointer]:
              - /url: https://www.anthropic.com/research/glasswing-initial-update
            - text: secure critically important software. We’ve also seen it in life sciences research, where the models are positing novel hypotheses and speeding up the development of new therapeutics.
          - paragraph [ref=e58]: Fable 5 and Mythos 5 are being offered at $10 per million input tokens and $50 per million output tokens—less than half the price of Claude Mythos Preview. Today’s joint launch is another step towards our goal of bringing advanced AI capabilities to as many users as possible, as quickly and as safely as we can.
          - heading "Evaluating Claude Fable 5 and Claude Mythos 5" [level=2] [ref=e59]
          - paragraph [ref=e60]: The table below compares the capabilities of Fable 5 and Mythos 5 to other leading models.
          - figure [ref=e62]:
            - img "Benchmark table showing Claude Fable and Mythos compared to other leading models" [ref=e63]
          - paragraph [ref=e64]: Fable 5 and Mythos 5 can work autonomously for longer than any previous Claude models. Below we discuss how these skills apply to software engineering, and cover the model’s improved capabilities in knowledge work, vision, memory, and life sciences research.
          - paragraph [ref=e65]:
            - emphasis [ref=e66]: Software engineering.
            - text: During early testing,
            - link "Stripe" [ref=e67] [cursor=pointer]:
              - /url: https://stripe.com/
            - text: "reported that Fable 5 compressed months of engineering into days. In a 50-million-line Ruby codebase, the model performed a codebase-wide migration in a day that would otherwise have taken a whole team over two months by hand. Fable 5 is also more token-efficient than past Claude models: on Cognition’s"
            - link "FrontierCode" [ref=e68] [cursor=pointer]:
              - /url: https://cognition.ai/blog/frontier-code
            - text: evaluation, which tests whether models can pass difficult coding tasks while meeting the standards of high-quality production codebases, Fable 5 scores highest among frontier models, even at medium effort.
          - figure [ref=e70]:
            - img [ref=e71]
          - figure [ref=e73]:
            - img [ref=e74]
          - paragraph [ref=e75]:
            - emphasis [ref=e76]: Knowledge work
            - text: . Fable 5 shows strong performance on complex analytical tasks. On
            - link "Hebbia" [ref=e77] [cursor=pointer]:
              - /url: https://www.hebbia.com/
            - text: ’s Finance Benchmark for senior-level reasoning, Fable 5 has the highest score of any model, with substantial gains in document-based reasoning, chart and table interpretation, and problem solving.
            - link "IMC" [ref=e78] [cursor=pointer]:
              - /url: https://www.imc.com/
            - text: noted that Fable 5 aced their trading-analysis evaluations nearly across the board, including factual lookup, conceptual reasoning, root-cause analysis, and expected-value analysis.
          - paragraph [ref=e79]:
            - emphasis [ref=e80]: Vision.
            - text: "Fable 5 is the new state-of-the-art model for tasks involving vision. It can extract precise numbers from detailed scientific figures and can perform complex vision-based tasks like rebuilding a web app’s source code from screenshots alone. It also needs less scaffolding: for example, previous Claude models struggled to play Pokémon FireRed even with harnesses that gave them additional helpful tools, but Fable 5 beat FireRed with a minimal, vision-only harness."
          - figure "A timelapse of Claude playing Pokémon FireRed from start to finish using only raw game screenshots — with no maps, navigation aids, or extra game-state information. Earlier Claude models needed a complex helper harness to play Pokémon; Claude Fable 5 completed the game with vision alone." [ref=e83]:
            - generic [ref=e84]: A timelapse of Claude playing Pokémon FireRed from start to finish using only raw game screenshots — with no maps, navigation aids, or extra game-state information. Earlier Claude models needed a complex helper harness to play Pokémon; Claude Fable 5 completed the game with vision alone.
          - paragraph [ref=e85]:
            - emphasis [ref=e86]: Memory and long-context.
            - text: Fable 5 stays focused across millions of tokens in long-running tasks and improves its outputs using its own notes. When we had the model play the deck-building game
            - link "Slay the Spire" [ref=e87] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Slay_the_Spire
              - emphasis [ref=e88]: Slay the Spire
            - text: ", giving it access to persistent file-based memory improved its performance three times more than for Opus 4.8; Fable also reached the game’s final act three times more often."
          - generic [ref=e90]:
