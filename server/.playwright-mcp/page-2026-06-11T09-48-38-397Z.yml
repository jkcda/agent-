          - heading "Claude Fable 5’s new safeguards" [level=2] [ref=e266]
          - paragraph [ref=e267]:
            - text: Mythos-class models have reached a threshold where they present significant risks. In April we began
            - link "Project Glasswing" [ref=e268] [cursor=pointer]:
              - /url: https://www.anthropic.com/glasswing
            - text: ", releasing the first Mythos-class model (Claude Mythos Preview) to only a limited group of cyber defenders and critical software infrastructure providers. When we did so, we stated that we hoped to eventually release"
            - link "Mythos-level capabilities to all our users" [ref=e269] [cursor=pointer]:
              - /url: https://www.anthropic.com/glasswing#:~:text=We%20do%20not,Preview3.
            - text: ", so long as we had developed new safeguards that were strong enough to reliably prevent misuse."
          - paragraph [ref=e270]: Over the past few months we have been improving these safeguards, and they are now robust enough for a general release. Because we have prioritized safety, we’ve deliberately tuned the safeguards to be cautious, and they are still stricter than would be ideal—for example, sometimes benign requests will trigger our classifiers. We recognize that this will be frustrating to some users, and our aim is to reduce false positives as we update and refine the safeguards after launch.
          - paragraph [ref=e271]:
            - text: Below we discuss each of Fable 5’s new safeguards in turn. Our wider suite of safeguards is discussed and evaluated in the model’s
            - link "system card" [ref=e272] [cursor=pointer]:
              - /url: https://anthropic.com/claude-fable-5-mythos-5-system-card
            - text: and our most recent
            - link "risk report" [ref=e273] [cursor=pointer]:
              - /url: https://cdn.sanity.io/files/4zrzovbb/website/097c63b5fe7dd8b14866e1f15bb1910ec713658a.pdf
            - text: .
          - heading "Safety classifiers" [level=3] [ref=e274]
          - paragraph [ref=e275]:
            - text: The frontier cybersecurity and research biology capabilities of Mythos-class models mean that they pose a substantial risk of
            - emphasis [ref=e276]: uplift
            - text: "to malicious actors. That is, these models could provide information or advice that assists those actors in causing serious harm that they couldn’t have received from other sources (for example, from internet search engines). Furthermore, a great deal of advanced usage of AI models is dual use: the same queries that are beneficial in the hands of cybersecurity professionals and biology researchers could be dangerous if available to malicious actors."
          - paragraph [ref=e277]: We therefore need strong safeguards to prevent misuse, and their coverage needs to be broad. The safeguards themselves have to stand up to sustained and sophisticated attempts to bypass them (also known as “jailbreaking” the system). The uplift from Mythos-level capabilities is valuable to many adversaries—for instance, those who could financially gain from cyberattacks—and we therefore expect them to be motivated to try to circumvent our safety measures.
          - paragraph [ref=e278]:
            - text: Fable 5 comes with a new set of
            - emphasis [ref=e279]: classifiers
            - text: ": separate AI systems that detect potential misuse, including jailbreak attempts, and prevent the main model (in this case Fable 5) from responding. We’ve been running classifiers on our models"
            - link "for some time" [ref=e280] [cursor=pointer]:
              - /url: https://www.anthropic.com/research/next-generation-constitutional-classifiers
            - text: ", and Fable 5’s classifiers are an extension of this previous work with extra coverage."
          - paragraph [ref=e281]: "When Fable’s classifiers detect a request related to cybersecurity, biology and chemistry, or distillation, the response is automatically handled by Claude Opus 4.8 instead. Users will be informed whenever this occurs. Opus 4.8 is a highly capable model in its own right: a response that falls back to Opus is a far better experience than an outright refusal from Fable. Our early data shows that more than 95% of Fable sessions involve no fallback at all—for those sessions, Fable 5’s performance is effectively the same as that of Mythos 5."
          - paragraph [ref=e282]: "The following are the areas covered by the classifiers:"
          - paragraph [ref=e283]:
            - emphasis [ref=e284]: 1. Cybersecurity
            - text: . Mythos-class models
            - link "excel" [ref=e285] [cursor=pointer]:
              - /url: https://red.anthropic.com/2026/mythos-preview/
            - text: at discovering and exploiting software vulnerabilities. They can thus make cyberattacks substantially easier and cheaper to commit. Mythos-class models also show strong skills in agentic hacking. This involves performing multiple different parts of a cyberattack in addition to finding exploits—reconnaissance, discovery, lateral movement, and more. To prevent these agentic hacking skills providing uplift in cyberattacks, we designed our cybersecurity classifiers to cover both exploitation and offensive cyber tasks in a broader sense. As shown in the graph below, our classifiers prevent Fable from making any progress on these tasks.
          - figure "Results of running cyber evaluations,3 with Fable 5 in a mode that blocks responses rather than falling back to Opus 4.8. Evaluations did not involve attempts to evade safeguards." [ref=e287]:
            - img [ref=e288]
            - emphasis [ref=e290]:
              - text: Results of running cyber evaluations,
              - superscript [ref=e291]: "3"
              - text: with Fable 5 in a mode that blocks responses rather than falling back to Opus 4.8. Evaluations did not involve attempts to evade safeguards.
          - paragraph [ref=e292]:
            - text: We extensively red-teamed our classifiers to test their robustness against jailbreaks. As well as internal testing, we ran an external bug bounty that produced no universal jailbreaks in over 1,000 hours of testing. External red-teaming organizations we engaged also failed to find any universal jailbreaks on long-form agentic tasks so far—although the UK AISI has made progress towards one within a brief initial testing window.
            - superscript [ref=e293]: "4"
            - text: It is likely impossible to
            - emphasis [ref=e294]: completely
            - text: prevent universal jailbreaks, but our goal is to make any remaining jailbreaks sufficiently slow and costly that we can detect and prevent them before they are used at scale.
          - paragraph [ref=e295]: "The graph below, from one of our internal evaluations, illustrates how Fable 5’s safeguards give it greater resistance to jailbreaks than our previous generally accessible models:"
          - figure "Results of an internal evaluation in which an automated red-teamer tries to use the model to complete a short task related to offensive cybersecurity across 400 turns, restarting and rewinding when blocked. The tasks are mostly simple and not representative of real cyber usage—they are sometimes as simple as encrypting files on a remote server. On more complex and realistic tasks we have not yet seen successful jailbreaks on our production system. Note that Opus 4.6 does not have blocking cyber safeguards." [ref=e297]:
            - img [ref=e298]
            - emphasis [ref=e300]: Results of an internal evaluation in which an automated red-teamer tries to use the model to complete a short task related to offensive cybersecurity across 400 turns, restarting and rewinding when blocked. The tasks are mostly simple and not representative of real cyber usage—they are sometimes as simple as encrypting files on a remote server. On more complex and realistic tasks we have not yet seen successful jailbreaks on our production system. Note that Opus 4.6 does not have blocking cyber safeguards.
          - paragraph [ref=e301]: One of our external partners found that Fable 5’s safeguards against harmful cyber queries were the most robust of any model tested (including Opus 4.8 and Opus 4.7). Fable 5 complied with zero harmful single-turn requests relating to planning a cyberattack, exploit development, or defense evasion. This held whether or not one of the requests used any of 30 different public jailbreak techniques.
          - paragraph [ref=e302]:
            - emphasis [ref=e303]: 2. Biology and chemistry.
            - text: We have long used
            - link "our classifiers" [ref=e304] [cursor=pointer]:
              - /url: https://www.anthropic.com/news/activating-asl3-protections
            - text: "to block our models from responding on a narrow selection of bioweapons-related queries. But we are no longer certain that blocking this narrow selection is enough. This is for two reasons: first, we have reason for concern about well-resourced malicious actors attempting to gain uplift from our models for highly risky biological research. Second, models now have a greater ability to accomplish real-world scientific tasks."
          - paragraph [ref=e305]:
            - text: For example, we tested Mythos 5’s ability to complete a challenging step in designing
            - link "adeno-associated viruses" [ref=e306] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Adeno-associated_virus
            - text: (AAVs). AAVs are a component for delivering gene therapies, but the same capability, in the wrong hands, could enable the design of dangerous viruses. In this task, various AI models were evaluated on their ability to predict how a genetic modification would impact the assembly of the virus’s outer shell (among a set of therapeutically-relevant unpublished candidates developed by
            - link "Dyno Therapeutics" [ref=e307] [cursor=pointer]:
              - /url: https://www.dynotx.com/
            - text: ). We did not explicitly train our models to perform this task—and yet Mythos-class models outperformed sophisticated models dedicated to protein tasks (known as “protein language models”) using their biological reasoning alone. This demonstrates a promising ability to complete simple but important tasks in gene therapy research and development—but also highlights the risk posed by such dual-use capabilities.
          - figure "Results of an evaluation in which our models predicted the unpublished experimental properties of the viral shell of a simple virus. Viral shell assembly is the simplest viral trait to predict in this context, but it is nonetheless an important property to get right when designing more complex features. AAV = adeno-associated virus." [ref=e309]:
            - img [ref=e310]
            - emphasis [ref=e312]: Results of an evaluation in which our models predicted the unpublished experimental properties of the viral shell of a simple virus. Viral shell assembly is the simplest viral trait to predict in this context, but it is nonetheless an important property to get right when designing more complex features. AAV = adeno-associated virus.
          - paragraph [ref=e313]: "Our priority was to safely release Fable as soon as we could, even at the cost of overly broad safeguards. Therefore, for the time being we have arranged for Fable to fall back to Opus 4.8 on most requests related to biology and chemistry. As with all of our classifiers, we hope to narrow these safeguards as soon as possible: as can be seen from the evidence above, there is great potential for positive applications of Fable for science, and we do not want false positives from our classifiers to get in the way. In the coming weeks, some biomedical researchers and companies will be able to join our trusted access program for biology capabilities in Mythos 5 (discussed below)."
          - paragraph [ref=e314]:
            - emphasis [ref=e315]: 3. Distillation
            - text: . We’ve previously identified
            - link "large-scale attempts" [ref=e316] [cursor=pointer]:
              - /url: https://www.anthropic.com/news/detecting-and-preventing-distillation-attacks
            - text: to extract (“distill”) Claude’s capabilities to train
            - link "competing" [ref=e317] [cursor=pointer]:
              - /url: https://www.anthropic.com/legal/commercial-terms
            - text: models in authoritarian countries. Distillation of Fable 5’s abilities could indirectly lead to the proliferation of near-frontier AI capabilities—and these could be released without the appropriate safeguards. Requests that are flagged by our classifiers as being part of such distillation attempts will fall back to Opus 4.8.
          - heading "A new data retention policy" [level=3] [ref=e318]
          - paragraph [ref=e319]:
            - text: Finally, we’re making a change to the way we handle business customer data for Fable 5, Mythos 5, and future models with similar or higher capability levels. We will require 30-day retention for all traffic on Mythos-class models, on both first- and third-party surfaces. We won’t use this data to train new Claude models, or for any non-safety-related purpose, and we’ve instituted new privacy protections including logging all human access to the data and ensuring its deletion after 30 days in almost all cases (see
            - link "this post" [ref=e320] [cursor=pointer]:
              - /url: https://support.claude.com/en/articles/15425996
            - text: for further details). The data will help us defend against complex and novel attacks (including new jailbreaks and attacks that operate across many requests) as well as help us identify and reduce false positives.
          - heading "Claude Mythos 5 and the trusted access program" [level=2] [ref=e321]
          - paragraph [ref=e322]: Beginning today, all users who currently have access to Claude Mythos Preview (for example, our cybersecurity partners in Project Glasswing) will be able to upgrade to Claude Mythos 5—the same model as Claude Fable 5 but with cyber safeguards lifted. Users will find Mythos 5 comparable to, or somewhat stronger than, Mythos Preview in most cases, while costing substantially less.
          - paragraph [ref=e323]:
            - text: In consultation with the US government, we plan to steadily expand access to Claude Mythos 5, continuing our
            - link "periodic addition" [ref=e324] [cursor=pointer]:
              - /url: https://www.anthropic.com/news/expanding-project-glasswing
            - text: of new partners, as well as pursuing a trusted access program that allows cybersecurity organizations to apply in a more systematic manner.
          - paragraph [ref=e325]: Our plans also include opening a trusted access program for biology, to help accelerate biomedical research and discover new therapies with Mythos-class capabilities. This program will provide access to Fable 5 with the biology and chemistry safeguards removed (but the cyber safeguards still in place). It will enroll a small number of researchers from a variety of life science organizations spanning fundamental and translational research; we’re planning to expand access to this program while simultaneously making our safeguards better.
          - heading "Availability" [level=2] [ref=e326]
          - paragraph [ref=e327]: Claude Fable 5 is available everywhere today. Claude Mythos 5 is restricted to Glasswing partners (with cyber safeguards lifted) and soon to select biology researchers (with biology and chemistry safeguards lifted) only, until our broader trusted access program is available.
          - paragraph [ref=e328]:
            - text: Pricing for both models is $10 per million input tokens and $50 per million output tokens. Developers can use claude-fable-5 via the
            - link "Claude API" [ref=e329] [cursor=pointer]:
              - /url: https://platform.claude.com/docs/en/about-claude/models/overview
            - text: .
          - paragraph [ref=e330]: "We expect demand for Fable 5 to be very high, and difficult to predict. On the Claude API and consumption-based Enterprise plans, Fable 5 is fully available from today. For subscription plans, we’d rather give access sooner than later, so we’re rolling out more conservatively, in stages:"
          - list [ref=e331]:
            - listitem [ref=e332]: From today through June 22, Fable 5 is included on Pro, Max, Team, and seat-based Enterprise plans at no extra cost.
            - listitem [ref=e333]:
              - text: On June 23, we’ll remove Fable 5 from those plans. Using it after that will require
              - link "usage credits" [ref=e334] [cursor=pointer]:
                - /url: https://support.claude.com/en/articles/12429409-manage-usage-credits-for-paid-claude-plans
              - text: . If capacity allows, we’ll extend the included window.
            - listitem [ref=e335]: After this point—when sufficient capacity allows us to do so—we aim to restore Fable 5 as a standard part of subscription plans. We intend to do this as quickly as we can.
          - paragraph [ref=e336]: Throughout this period, we’ll communicate any changes ahead of time so users know where things stand.
          - paragraph
          - paragraph [ref=e337]:
            - emphasis [ref=e338]: "Edit June 9, 2026: Updated the discussion of AAVs to note that the candidates were developed by Dyno Therapeutics."
      - generic [ref=e339]:
        - generic [ref=e340]:
          - heading "Footnotes" [level=4] [ref=e341]
          - list [ref=e342]:
            - listitem [ref=e343]:
              - text: Mythos-class models are a tier of Claude models that sit above our Opus class in capability. The first, Claude Mythos Preview, was released in April through
              - link "Project Glasswing" [ref=e344] [cursor=pointer]:
                - /url: https://www.anthropic.com/glasswing
              - text: . That is followed today by Claude Fable 5 and Claude Mythos 5.
            - listitem [ref=e345]:
              - text: Fable is from the Latin
              - emphasis [ref=e346]: fabula
              - text: ", “that which is told,” akin to the Greek"
              - emphasis [ref=e347]: mythos
              - text: . The safeguards are what distinguish the two models (Fable and Mythos) and are why we’ve given them different names.
            - listitem [ref=e348]: "Metrics: Firefox = fraction of trials achieving arbitrary code execution (the exploit's full-success tier). OSS-Fuzz = severity-weighted mean of the five-tier score (0.2 crash → 1.0 control-flow hijack), so values are a weighted average rather than a success rate. CyberGym = fraction reproducing the target vulnerability (the public leaderboard metric). CyScenarioBench = success rate averaged equally across its challenges."
            - listitem [ref=e349]: A universal jailbreak can be defined as any prompt, script, or harness that allows a user to interact with a model as if its safeguards were not present. This is opposed to more minor jailbreaks that are only effective in very limited contexts or require additional effort to be adapted to each new situation.
