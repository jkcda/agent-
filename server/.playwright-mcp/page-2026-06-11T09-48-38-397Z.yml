                - generic [ref=e100]: Claude Fable 5 built this simulation of the solar system, deriving the planets' orbital motion from physics first principles and using it to predict solar eclipses.
          - paragraph [ref=e101]:
            - emphasis [ref=e102]: "Drug design:"
            - text: "Using Mythos 5, our internal protein design experts accelerated aspects of the drug design process by around ten times. In one example, they found that Mythos 5, with protein design and bioinformatics tools but no human assistance, matches or beats skilled human operators. In doing so, the model executes all of the tasks that are normally completed by a scientist: choosing binding sites, selecting and running protein design tools, and recovering from failures along the way. Nine of the 14 protein targets from this study (shown below) yielded strong candidates for drug design that we’re currently investigating."
          - figure "Protein complexes designed by Mythos 5. Targets include immune checkpoints, growth-factor and receptor signaling, neurodegeneration, muscle disease, and harder structural targets." [ref=e104]:
            - img [ref=e105]
            - emphasis [ref=e107]: Protein complexes designed by Mythos 5. Targets include immune checkpoints, growth-factor and receptor signaling, neurodegeneration, muscle disease, and harder structural targets.
          - paragraph [ref=e108]:
            - emphasis [ref=e109]: Novel hypotheses in molecular biology.
            - text: Mythos 5 is our first model to consistently produce novel, compelling scientific hypotheses. In blinded head-to-head comparisons against Opus-class models, our scientists preferred Mythos’s molecular biology hypotheses ~80% of the time, and have advanced several to experimental evaluation. In the meantime, one Mythos hypothesis—a novel mechanism for an
            - emphasis [ref=e110]: E. coli
            - text: protein—was corroborated in
            - link "a study" [ref=e111] [cursor=pointer]:
              - /url: https://www.biorxiv.org/content/10.64898/2026.03.12.711259v1
            - text: from a lab independently working on the same problem.
          - paragraph [ref=e112]:
            - emphasis [ref=e113]: Novel research in genomics.
            - strong [ref=e114]
            - text: Mythos 5 conducted novel genomics research in over a week of largely autonomous work. It assembled single-cell data for millions of cells spanning 138 animal species and designed and trained a custom machine learning model to identify cells performing the same role in even distantly related organisms. With only high-level human input, Mythos 5’s trained model outperformed a recent model published in the journal
            - emphasis [ref=e115]: Science
            - text: —despite being 100 times smaller. We intend to publish these results in the coming months.
          - paragraph [ref=e116]:
            - emphasis [ref=e117]: Alignment
            - text: . In our automated alignment assessment we found that Mythos 5’s level of misaligned behavior (including misaligned actions taken by the model such as deception, and cooperation with misuse of the model by a user) was low, and similar to that of Opus 4.8. Given they are the same underlying model, Fable 5’s level of alignment will be similar. The assessment is described in full, along with a detailed suite of other safety and capabilities tests, in the model’s
            - link "system card" [ref=e118] [cursor=pointer]:
              - /url: https://anthropic.com/claude-fable-5-mythos-5-system-card
            - text: .
          - figure "Overall level of misaligned behaviors from our automated alignment assessment. See section 6.2.3.1 of the system card for more." [ref=e120]:
            - img [ref=e121]
            - emphasis [ref=e123]:
              - text: Overall level of misaligned behaviors from our automated alignment assessment. See section 6.2.3.1 of the
              - link "system card" [ref=e124] [cursor=pointer]:
                - /url: https://anthropic.com/claude-fable-5-mythos-5-system-card
              - text: for more.
